<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Starting Clinic System...</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: linear-gradient(160deg, #F7F9F9 0%, #E8F2F0 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .loader-box {
        text-align: center;
    }
    .spinner {
        width: 56px;
        height: 56px;
        border: 4px solid #E7ECEB;
        border-top-color: #2A9D8F;
        border-radius: 50%;
        margin: 0 auto 24px;
        animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    .loader-title {
        font-size: 20px;
        font-weight: 700;
        color: #12302E;
        margin-bottom: 8px;
    }
    .loader-subtitle {
        font-size: 13px;
        color: #6B7280;
    }
    .loader-dots span {
        animation: blink 1.4s infinite both;
    }
    .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loader-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
        0%, 80%, 100% { opacity: 0; }
        40% { opacity: 1; }
    }
</style>
</head>
<body>

    <div class="loader-box">
        <div class="spinner"></div>
        <div class="loader-title">Starting Clinic System</div>
        <div class="loader-subtitle" id="status-text">
            Preparing your workspace<span class="loader-dots"><span>.</span><span>.</span><span>.</span></span>
        </div>
    </div>

    <script>
        const targetUrl = 'http://127.0.0.1:8001/login';
        let attempts = 0;
        const maxAttempts = 60; // ~30 seconds max wait (60 x 500ms)

        const statusMessages = [
            'Preparing your workspace',
            'Starting the local server',
            'Almost there',
            'Just a little longer'
        ];

        function updateStatus() {
            const msgIndex = Math.min(Math.floor(attempts / 8), statusMessages.length - 1);
            document.getElementById('status-text').innerHTML =
                statusMessages[msgIndex] + '<span class="loader-dots"><span>.</span><span>.</span><span>.</span></span>';
        }

        function checkServer() {
            attempts++;
            updateStatus();

            fetch(targetUrl, { mode: 'no-cors' })
                .then(() => {
                    // Server responded - redirect now
                    window.location.href = targetUrl;
                })
                .catch(() => {
                    if (attempts < maxAttempts) {
                        setTimeout(checkServer, 500);
                    } else {
                        // Timed out - redirect anyway, most likely it's just slow
                        window.location.href = targetUrl;
                    }
                });
        }

        // Give the server a brief head start before the first check
        setTimeout(checkServer, 800);
    </script>

</body>
</html>
